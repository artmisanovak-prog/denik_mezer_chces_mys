<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deník mezer — Zápisník</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #2a2a2a;
            color: #e0e0e0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .header {
            grid-column: 1 / -1;
            border-bottom: 2px solid #4a4a4a;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .nav {
            grid-column: 1 / -1;
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid #4a4a4a;
            padding-bottom: 15px;
        }

        .nav a {
            color: #999;
            text-decoration: none;
            font-size: 0.9em;
            padding: 5px 10px;
            border: 1px solid #4a4a4a;
        }

        .nav a:hover {
            color: #e0e0e0;
            border-color: #e0e0e0;
        }

        .editor-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cards-display {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .card {
            border: 2px solid #4a4a4a;
            padding: 15px;
            background-color: #1a1a1a;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: #e0e0e0;
        }

        .card img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            margin-bottom: 10px;
            opacity: 0.7;
        }

        .card-name {
            font-size: 0.95em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card-text {
            font-size: 0.7em;
            color: #999;
            line-height: 1.2;
        }

        button {
            background-color: #3a3a3a;
            color: #e0e0e0;
            border: 1px solid #4a4a4a;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'DM Mono', monospace;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #4a4a4a;
            border-color: #e0e0e0;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .button-group button {
            flex: 1;
        }

        textarea {
            width: 100%;
            height: 400px;
            background-color: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #4a4a4a;
            padding: 15px;
            font-family: 'DM Mono', monospace;
            font-size: 0.9em;
            resize: none;
        }

        textarea:focus {
            outline: none;
            border-color: #e0e0e0;
        }

        .editor-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .info-item {
            border: 1px solid #4a4a4a;
            padding: 10px;
            background-color: #1a1a1a;
            text-align: center;
            font-size: 0.85em;
        }

        .info-value {
            font-weight: bold;
            color: #e0e0e0;
            font-size: 1.2em;
        }

        .history-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .history-header {
            border-bottom: 2px solid #4a4a4a;
            padding-bottom: 15px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 600px;
            overflow-y: auto;
        }

        .history-item {
            border: 1px solid #4a4a4a;
            padding: 12px;
            background-color: #1a1a1a;
            cursor: pointer;
            transition: all 0.3s;
        }

        .history-item:hover {
            border-color: #e0e0e0;
            background-color: #252525;
        }

        .history-date {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .history-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75em;
            color: #999;
        }

        .history-cards {
            font-size: 0.7em;
            color: #666;
            margin-top: 5px;
        }

        .history-actions {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .history-actions button {
            flex: 1;
            padding: 5px 8px;
            font-size: 0.7em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #2a2a2a;
            border: 2px solid #4a4a4a;
            padding: 30px;
            max-width: 600px;
            width: 90%;
        }

        .modal-close {
            float: right;
            cursor: pointer;
            font-size: 1.5em;
            color: #999;
        }

        .empty-state {
            color: #666;
            text-align: center;
            padding: 40px 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Deník mezer</h1>
        <p>Pij 3 karty • Napiš • Mapuj • Vidíš</p>
    </div>

    <div class="nav">
        <a href="../../index.html">← Domů</a>
        <a href="knihovna.html">📚 Knihovna</a>
        <a href="archiv.html">📦 Archiv</a>
    </div>

    <div class="container">
        <div class="editor-section">
            <div>
                <h2 style="margin-bottom: 15px;">Tvoje karty</h2>
                <div class="cards-display" id="cardsDisplay"></div>
                <button onclick="generateNewCards()" style="width: 100%; margin-top: 15px;">🎲 Nové karty</button>
            </div>

            <div>
                <h2 style="margin-bottom: 15px;">Tvůj text</h2>
                <textarea id="textInput" placeholder="Piš co chceš..."></textarea>
            </div>

            <div class="editor-info">
                <div class="info-item">
                    <div>Slov</div>
                    <div class="info-value" id="wordCount">0</div>
                </div>
                <div class="info-item">
                    <div>Vět</div>
                    <div class="info-value" id="sentenceCount">0</div>
                </div>
                <div class="info-item">
                    <div>Znaků</div>
                    <div class="info-value" id="charCount">0</div>
                </div>
            </div>

            <div class="button-group">
                <button onclick="analyzeText()">🔍 Analyzovat</button>
                <button onclick="shareCards()">🔗 Sdílet</button>
                <button onclick="saveEntry()" style="background-color: #5a5a5a;">💾 Uložit</button>
            </div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h2>📋 Historie</h2>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">Zatím žádné záznamy</div>
            </div>
        </div>
    </div>

    <div class="modal" id="analysisModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal('analysisModal')">&times;</span>
            <h2>Analýza textu</h2>
            <p style="color: #999; margin-top: 10px;">Tvůj text jde do analyzátoru.</p>
            <button onclick="window.open('analyzer.html?text=' + encodeURIComponent(document.getElementById('textInput').value), '_blank')" style="margin-top: 15px; width: 100%;">→ Jít do Analyzátoru</button>
        </div>
    </div>

    <div class="modal" id="shareModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal('shareModal')">&times;</span>
            <h2>Sdílet karty</h2>
            <div id="shareLink" style="background-color: #1a1a1a; padding: 10px; margin: 10px 0; border: 1px solid #4a4a4a; font-family: 'DM Mono', monospace; font-size: 0.8em; word-break: break-all; cursor: pointer;"></div>
        </div>
    </div>

    <div class="modal" id="saveModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal('saveModal')">&times;</span>
            <h2>Uložit zápis</h2>
            <textarea id="notesInput" style="height: 80px; margin-bottom: 15px;" placeholder="Poznámka (volitelně)..."></textarea>
            <button onclick="confirmSave()" style="width: 100%; background-color: #5a5a5a;">Potvrdit uložení</button>
        </div>
    </div>

    <script>
        let CARDS = [];
        let currentCards = [];
        let historyData = [];

        async function loadCards() {
            try {
                const response = await fetch('../../doma/data/karty.json');
                CARDS = await response.json();
                generateNewCards();
            } catch (e) {
                console.error('Chyba při načítání karet:', e);
            }
        }

        function generateNewCards() {
            const shuffled = CARDS.sort(() => 0.5 - Math.random());
            currentCards = shuffled.slice(0, 3);
            displayCards();
            document.getElementById('textInput').value = '';
            updateStats();
        }

        function displayCards() {
            const container = document.getElementById('cardsDisplay');
            container.innerHTML = currentCards.map(card => `
                <div class="card">
                    <img src="../../${card.image}" alt="${card.name}">
                    <div class="card-name">${card.name}</div>
                    <div class="card-text">${card.text.substring(0, 50)}...</div>
                </div>
            `).join('');
        }

        function updateStats() {
            const text = document.getElementById('textInput').value;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            const sentences = text.trim() ? text.split(/[.!?]+/).filter(s => s.trim()).length : 0;
            document.getElementById('wordCount').textContent = words;
            document.getElementById('sentenceCount').textContent = sentences;
            document.getElementById('charCount').textContent = text.length;
        }

        function analyzeText() {
            const text = document.getElementById('textInput').value;
            if (!text.trim()) {
                alert('Napiš něco k analýze.');
                return;
            }
            document.getElementById('analysisModal').classList.add('active');
        }

        function shareCards() {
            const cardNames = currentCards.map(c => c.name).join(',');
            const baseUrl = window.location.origin + window.location.pathname;
            const shareUrl = `${baseUrl}?cards=${cardNames}`;
            document.getElementById('shareLink').textContent = shareUrl;
            document.getElementById('shareModal').classList.add('active');
        }

        function saveEntry() {
            const text = document.getElementById('textInput').value;
            if (!text.trim()) {
                alert('Nemáš co ukládat.');
                return;
            }
            document.getElementById('saveModal').classList.add('active');
        }

        function confirmSave() {
            const text = document.getElementById('textInput').value;
            const notes = document.getElementById('notesInput').value;
            const entry = {
                id: Date.now(),
                timestamp: new Date().toLocaleString('cs-CZ'),
                cards: currentCards.map(c => c.name),
                text: text,
                notes: notes,
                wordCount: document.getElementById('wordCount').textContent
            };

            historyData.unshift(entry);
            localStorage.setItem('diaryEntries', JSON.stringify(historyData));
            document.getElementById('saveModal').classList.remove('active');
            document.getElementById('textInput').value = '';
            document.getElementById('notesInput').value = '';
            loadHistory();
            generateNewCards();
            alert('✓ Zápis uložen!');
        }

        function loadHistory() {
            const saved = localStorage.getItem('diaryEntries');
            historyData = saved ? JSON.parse(saved) : [];

            const container = document.getElementById('historyList');
            if (historyData.length === 0) {
                container.innerHTML = '<div class="empty-state">Zatím žádné záznamy</div>';
                return;
            }

            container.innerHTML = historyData.map(entry => `
                <div class="history-item">
                    <div class="history-date">${entry.timestamp}</div>
                    <div class="history-meta">
                        <span>${entry.wordCount} slov</span>
                    </div>
                    <div class="history-cards">Karty: ${entry.cards.join(', ')}</div>
                    <div class="history-actions">
                        <button onclick="loadEntry(${entry.id})">Otevřít</button>
                        <button onclick="deleteEntry(${entry.id})">Smazat</button>
                        <button onclick="exportEntry(${entry.id})">Export</button>
                    </div>
                </div>
            `).join('');
        }

        function loadEntry(id) {
            const entry = historyData.find(e => e.id === id);
            if (entry) {
                document.getElementById('textInput').value = entry.text;
                currentCards = entry.cards.map(name => CARDS.find(c => c.name === name));
                displayCards();
                updateStats();
                window.scrollTo(0, 0);
            }
        }

        function deleteEntry(id) {
            if (confirm('Opravdu smazat?')) {
                historyData = historyData.filter(e => e.id !== id);
                localStorage.setItem('diaryEntries', JSON.stringify(historyData));
                loadHistory();
            }
        }

        function exportEntry(id) {
            const entry = historyData.find(e => e.id === id);
            if (!entry) return;

            const content = `DENÍK MEZER
${entry.timestamp}

KARTY: ${entry.cards.join(', ')}

${entry.text}

${entry.notes ? `\nPOZNÁMKA:\n${entry.notes}` : ''}
            `;

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `denik_${entry.id}.txt`;
            a.click();
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        document.getElementById('textInput').addEventListener('input', updateStats);
        loadCards();
        loadHistory();
    </script>
</body>
</html>
