<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzátor — Fyzika jazyka</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #2a2a2a;
            color: #e0e0e0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            border-bottom: 2px solid #4a4a4a;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .nav {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #4a4a4a;
        }

        .nav a {
            color: #999;
            text-decoration: none;
            font-size: 0.9em;
            padding: 5px 10px;
            border: 1px solid #4a4a4a;
        }

        .nav a:hover {
            color: #e0e0e0;
            border-color: #e0e0e0;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            width: 100%;
            height: 400px;
            background-color: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #4a4a4a;
            padding: 15px;
            font-family: 'DM Mono', monospace;
            font-size: 0.85em;
            resize: none;
        }

        textarea:focus {
            outline: none;
            border-color: #e0e0e0;
        }

        button {
            background-color: #3a3a3a;
            color: #e0e0e0;
            border: 1px solid #4a4a4a;
            padding: 12px 20px;
            cursor: pointer;
            font-family: 'DM Mono', monospace;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #4a4a4a;
            border-color: #e0e0e0;
        }

        button.primary {
            background-color: #5a5a5a;
            flex: 1;
        }

        .output-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-box {
            background-color: #1a1a1a;
            border: 1px solid #4a4a4a;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.8em;
            color: #999;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .figures-section {
            background-color: #1a1a1a;
            border: 1px solid #4a4a4a;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .figures-title {
            font-size: 0.95em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .figure-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #3a3a3a;
            font-size: 0.85em;
        }

        .figure-item:last-child {
            border-bottom: none;
        }

        .highlighted-text-section {
            border: 1px solid #4a4a4a;
            padding: 15px;
            background-color: #1a1a1a;
            max-height: 350px;
            overflow-y: auto;
            font-family: 'DM Mono', monospace;
            font-size: 0.75em;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .figure-highlight {
            padding: 2px 4px;
            cursor: pointer;
            margin: 0 1px;
        }

        .angles-section {
            background-color: #1a1a1a;
            border: 1px solid #4a4a4a;
            padding: 15px;
        }

        .angles-title {
            font-size: 0.95em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .angle-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #3a3a3a;
            font-size: 0.85em;
        }

        .angle-item:last-child {
            border-bottom: none;
        }

        .empty-state {
            color: #666;
            text-align: center;
            padding: 30px;
            font-style: italic;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #4a4a4a;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5a5a5a;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Analyzátor úhlů</h1>
        <p>Mapuj strukturu textu • Všech 60 figur bez vah</p>
    </div>

    <div class="nav">
        <a href="../../index.html">← Domů</a>
        <a href="zapisnik.html">← Zpět do deníku</a>
    </div>

    <div class="container">
        <div class="main-grid">
            <div class="input-section">
                <h2>Tvůj text</h2>
                <textarea id="inputText" placeholder="Vlož nebo napiš text..."></textarea>
                <div style="display: flex; gap: 10px;">
                    <button class="primary" onclick="analyzeText()">🔍 Analyzovat</button>
                    <button onclick="clearAnalysis()">🗑 Vymazat</button>
                </div>
            </div>

            <div class="output-section">
                <h2>Analýza</h2>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">Slov</div>
                        <div class="stat-value" id="statWords">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Vět</div>
                        <div class="stat-value" id="statSentences">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Figur</div>
                        <div class="stat-value" id="statFigures">0</div>
                    </div>
                </div>

                <div class="figures-section">
                    <div class="figures-title">60 FIGUR — CO SE OBJEVILO</div>
                    <div id="figuresOutput" class="empty-state">Analyzuj text</div>
                </div>

                <div class="highlighted-text-section">
                    <div style="font-weight: bold; margin-bottom: 10px; color: #999;">TEXT SE ZVÝRAZNĚNÍM</div>
                    <div id="highlightedText" class="empty-state">Text se zvýrazní po analýze</div>
                </div>

                <div class="angles-section">
                    <div class="angles-title">12 ÚHLŮ POHLEDU</div>
                    <div id="anglesOutput" class="empty-state">Úhly se vypočítají z figur</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FIGURES = {
            // SYNTAKTICKÉ
            "Fragment": {
                detect: (text) => {
                    const words = text.trim().split(/\s+/);
                    return words.length < 5 && text.includes('.');
                },
                color: "#4a7bc1"
            },
            "Elipsa": {
                detect: (text) => {
                    return /\.\s+[A-Z]/.test(text) && text.split(/[.!?]/).length > 2;
                },
                color: "#888888"
            },
            "Anafora": {
                detect: (text, allSentences) => {
                    const sentences = text.split(/[.!?]+/);
                    if (sentences.length < 2) return false;
                    const firstWords = sentences.map(s => s.trim().split(/\s+/)[0]);
                    return firstWords.filter((w, i, arr) => w === arr[i-1]).length >= 2;
                },
                color: "#ff6b9d"
            },
            "Epifora": {
                detect: (text, allSentences) => {
                    const sentences = text.split(/[.!?]+/);
                    if (sentences.length < 2) return false;
                    const lastWords = sentences.map(s => s.trim().split(/\s+/).pop());
                    return lastWords.filter((w, i, arr) => w === arr[i-1]).length >= 2;
                },
                color: "#ff6b9d"
            },
            "Paralelismus": {
                detect: (text) => {
                    const sentences = text.split(/[.!?]+/).map(s => s.trim());
                    if (sentences.length < 2) return false;
                    const lengths = sentences.map(s => s.split(/\s+/).length);
                    return lengths.filter((l, i, arr) => Math.abs(l - arr[i-1]) < 2).length >= 2;
                },
                color: "#a78bfa"
            },
            "Enumerace": {
                detect: (text) => {
                    return (text.match(/,/g) || []).length >= 3;
                },
                color: "#fbbf24"
            },
            "Polysyndeton": {
                detect: (text) => {
                    return (text.match(/ a /g) || []).length >= 3;
                },
                color: "#34d399"
            },
            "Asyndeton": {
                detect: (text) => {
                    const parts = text.split(/[,;]/);
                    return parts.length >= 3 && !text.includes(' a ');
                },
                color: "#f472b6"
            },
            "Aposiopeze": {
                detect: (text) => {
                    return text.includes('...') || text.includes('—');
                },
                color: "#ec4899"
            },
            "Parenteze": {
                detect: (text) => {
                    return /\([^)]*\)/.test(text);
                },
                color: "#14b8a6"
            },
            "Apozice": {
                detect: (text) => {
                    return /\w+,\s*\w+/.test(text) && text.split(',').length >= 2;
                },
                color: "#8b5cf6"
            },
            "Inverze": {
                detect: (text) => {
                    const words = text.split(/\s+/);
                    return words.length > 3 && text.includes('jsem');
                },
                color: "#f59e0b"
            },
            "Anastrofa": {
                detect: (text) => {
                    return /\w+.*\w+\s+a\s+\w+.*\w+/.test(text);
                },
                color: "#06b6d4"
            },
            "Chiasmus": {
                detect: (text) => {
                    return /(\w+).*(\w+).*\2.*\1/.test(text);
                },
                color: "#d946ef"
            },
            "Hypotaxe": {
                detect: (text) => {
                    return /protože|když|aby|jelikož|pokud|ačkoli/i.test(text);
                },
                color: "#7c3aed"
            },
            "Parataxe": {
                detect: (text) => {
                    const sentences = text.split(/[.!?]+/);
                    return sentences.length >= 3 && !text.includes('protože');
                },
                color: "#3b82f6"
            },
            "DloheVety": {
                detect: (text) => {
                    return text.split(/\s+/).length > 30;
                },
                color: "#60a5fa"
            },

            // LEXIKÁLNÍ
            "Repetice": {
                detect: (text) => {
                    const words = text.toLowerCase().split(/\s+/);
                    const counted = {};
                    words.forEach(w => counted[w] = (counted[w] || 0) + 1);
                    return Object.values(counted).some(c => c >= 3);
                },
                color: "#ef4444"
            },
            "Asonance": {
                detect: (text) => {
                    const vowels = text.toLowerCase().match(/[aeiouáéíóúůý]/g) || [];
                    const vowelCounts = {};
                    vowels.forEach(v => vowelCounts[v] = (vowelCounts[v] || 0) + 1);
                    return Object.values(vowelCounts).some(c => c >= 4);
                },
                color: "#f87171"
            },
            "Aliterace": {
                detect: (text) => {
                    const words = text.split(/\s+/);
                    if (words.length < 2) return false;
                    const firstLetters = words.slice(0, 3).map(w => w[0].toLowerCase());
                    return firstLetters.every(l => l === firstLetters[0]);
                },
                color: "#fca5a5"
            },
            "Onomatopie": {
                detect: (text) => {
                    return /psst|hups|brnk|prsk|šum|sykot|vrz|buch|zv/i.test(text);
                },
                color: "#fed7aa"
            },
            "Rytmika": {
                detect: (text) => {
                    const sentences = text.split(/[.!?]+/);
                    if (sentences.length < 2) return false;
                    const lengths = sentences.map(s => s.split(/\s+/).length);
                    return lengths.every(l => Math.abs(l - lengths[0]) < 3);
                },
                color: "#fcd34d"
            },
            "Kolokace": {
                detect: (text) => {
                    return /horkou? čokolád|černé? mýšlenk|studená? vod|sladký? zvuk/i.test(text);
                },
                color: "#fbbf24"
            },

            // SÉMANTICKÉ
            "Paradox": {
                detect: (text) => {
                    return /(.+) není \1|mám a nemám|je a není/i.test(text);
                },
                color: "#c0392b"
            },
            "Kontrast": {
                detect: (text) => {
                    return /ale|přesto|však|naopak|na rozdíl/i.test(text);
                },
                color: "#e74c3c"
            },
            "Ironie": {
                detect: (text) => {
                    return (text.includes('!') || text.includes('?')) && text.length < 50;
                },
                color: "#1abc9c"
            },
            "Metafora": {
                detect: (text) => {
                    return / je / .test(text) && !text.includes('je to');
                },
                color: "#e67e22"
            },
            "Metonymie": {
                detect: (text) => {
                    return /nosím modr|čtu Nerud/i.test(text);
                },
                color: "#d35400"
            },
            "Synekdocha": {
                detect: (text) => {
                    return /všechny tvář|všechna srd|potřebuju ruc/i.test(text);
                },
                color: "#e8daef"
            },
            "Personifikace": {
                detect: (text) => {
                    const abstracts = ['mlčení', 'myšlenka', 'slovo', 'jazyk', 'noc', 'cesta', 'hora'];
                    const actions = ['mluví', 'umírá', 'žije', 'čeká', 'sní', 'bojuje', 'skáče', 'zpívá'];
                    return abstracts.some(a => text.toLowerCase().includes(a)) && 
                           actions.some(ac => text.toLowerCase().includes(ac));
                },
                color: "#2ecc71"
            },
            "Synestezie": {
                detect: (text) => {
                    const mixed = [
                        /teplá barv|studená vůn|hrubý hlas|tichá barv|sladký zvuk|hořký zvuk|sladký pohled/i
                    ];
                    return mixed.some(m => m.test(text));
                },
                color: "#16a085"
            },
            "Oxymoron": {
                detect: (text) => {
                    return /neživá příroda|hluboké ticho|živý mrtvý|sladký zlo/i.test(text);
                },
                color: "#c0392b"
            },
            "Hyperbola": {
                detect: (text) => {
                    return /tisíckrát|milionkrát|nekonečně|na věčnost/i.test(text);
                },
                color: "#f39c12"
            },
            "Parabola": {
                detect: (text) => {
                    return text.length > 100 && /nyní|proto|učení|poučení|morál/i.test(text);
                },
                color: "#9b59b6"
            },

            // GRAMATICKÉ
            "Imperativ": {
                detect: (text) => {
                    return /^[a-z]+\s*!|^(Dělej|Čekej|Podívej|Slyš|Mlč)!/i.test(text);
                },
                color: "#e74c3c"
            },
            "Negace": {
                detect: (text) => {
                    return /ne[a-z]+|bez|žádný|nikdy|nic|nikdo/i.test(text);
                },
                color: "#34495e"
            },
            "Gradace": {
                detect: (text) => {
                    return /více|méně|dále|hlouběji|líp|hůř|obrovský|nesmírný/i.test(text);
                },
                color: "#9b59b6"
            },
            "Antiklimax": {
                detect: (text) => {
                    const words = text.split(/\s+/);
                    return words.length > 5 && text.includes(',');
                },
                color: "#16a085"
            },
            "Redundance": {
                detect: (text) => {
                    return /bílý sníh|mlčení a ticho|vidím oči a pohled|slova a řeč/i.test(text);
                },
                color: "#95a5a6"
            },
            "Tautologie": {
                detect: (text) => {
                    return /je je|muž je muž|život je život|co je to je/i.test(text);
                },
                color: "#7f8c8d"
            },
            "DeformovanaFrazeologie": {
                detect: (text) => {
                    return /mozek padá|mozek cibule|srdce železo|hlava jako/i.test(text);
                },
                color: "#d35400"
            },
            "Apostrofa": {
                detect: (text) => {
                    return /^(Ó|Ach|Ah),\s+\w+|^[A-Z]+,\s*!/i.test(text);
                },
                color: "#c0392b"
            },
            "Ilokuci": {
                detect: (text) => {
                    return /\?|!|prosím|prosíme/.test(text);
                },
                color: "#3498db"
            },
            "Komprese": {
                detect: (text) => {
                    return text.split(/\s+/).length < 10 && text.includes('.');
                },
                color: "#2980b9"
            },
            "Neologismus": {
                detect: (text) => {
                    return /pavoučení|myšlenkovina|informatika|ne[a-z]+ení|[a-z]+nost/i.test(text);
                },
                color: "#8e44ad"
            },
            "VyplnovaSlova": {
                detect: (text) => {
                    return /\bvíš\b|no\b|\bjak|umm|prostě|jakoby/i.test(text);
                },
                color: "#95a5a6"
            },
            "Fixace": {
                detect: (text) => {
                    const words = text.toLowerCase().split(/\s+/);
                    const counted = {};
                    words.forEach(w => counted[w] = (counted[w] || 0) + 1);
                    return Object.values(counted).some(c => c >= 4);
                },
                color: "#e67e22"
            },
            "Permutace": {
                detect: (text) => {
                    return /(\w+).*(\w+).*(\w+).*(\2).*(\1)/.test(text);
                },
                color: "#1abc9c"
            },
            "Odskok": {
                detect: (text) => {
                    return text.includes('.') && text.includes('Mimochodem');
                },
                color: "#e74c3c"
            },
            "Preskok": {
                detect: (text) => {
                    return text.includes('...') && text.includes('"');
                },
                color: "#f39c12"
            },
            "ZmenaRole": {
                detect: (text) => {
                    return /já|jsem|já jsem/.test(text) && /on|ona|bylo|byla/.test(text);
                },
                color: "#3498db"
            },
            "ZmenaTempo": {
                detect: (text) => {
                    const sentences = text.split(/[.!?]+/);
                    const lengths = sentences.map(s => s.split(/\s+/).length);
                    return Math.max(...lengths) - Math.min(...lengths) > 10;
                },
                color: "#9b59b6"
            },
            "ZmenaMista": {
                detect: (text) => {
                    return /Praha|Londýn|Barcelon|v|na|do/.test(text);
                },
                color: "#16a085"
            },
            "ZmenaCasu": {
                detect: (text) => {
                    return /jsem|byl|byla|bude|budu/i.test(text);
                },
                color: "#2980b9"
            },
            "ZtrataSouseda": {
                detect: (text) => {
                    return /sám|samot|bez/.test(text);
                },
                color: "#c0392b"
            },
            "GramatickaDeviace": {
                detect: (text) => {
                    return /ty tam|vy tam|to já sem|sem si/i.test(text);
                },
                color: "#e74c3c"
            },
            "Dekonstrualizace": {
                detect: (text) => {
                    return /slovo|znamená|co je|kdo/.test(text) && text.length > 50;
                },
                color: "#8e44ad"
            },
            "Prolinani": {
                detect: (text) => {
                    return /a také|a zároveň|a stejně|a přitom/i.test(text);
                },
                color: "#16a085"
            },
            "HapaxLegomena": {
                detect: (text) => {
                    const words = text.toLowerCase().split(/\s+/);
                    const counted = {};
                    words.forEach(w => counted[w] = (counted[w] || 0) + 1);
                    return Object.values(counted).some(c => c === 1) && Object.keys(counted).length > 10;
                },
                color: "#34495e"
            }
        };

        const ANGLES = {
            "Surrealistický": ["Fragment", "Personifikace", "Synestezie", "Metafora"],
            "Analytický": ["Gradace", "Kontrast", "Hypotaxe", "Negace"],
            "Osobní": ["Apostrof", "Fixace", "ZmenaRole", "Repetice"],
            "Univerzální": ["Aforismus", "Tautologie", "Parabola", "Paradox"],
            "Hravý": ["Ironie", "Oxymoron", "Fragment", "Onomatopie"],
            "Vážný": ["Gradace", "Hyperbola", "Repetice", "Hypotaxe"],
            "Abstraktní": ["Personifikace", "Synestezie", "Metafora", "Paradox"],
            "Konkrétní": ["Enumerace", "Repetice", "Kolokace", "Imperativ"],
            "Lineární": ["Gradace", "Parataxe", "DloheVety", "Anafora"],
            "Chaotický": ["Fragment", "Asyndeton", "Preskok", "Odskok"],
            "Bezčasný": ["Tautologie", "Aforismus", "Paradox", "Parabola"],
            "Situační": ["ZmenaCasu", "ZmenaMista", "ZmenaRole", "Repetice"]
        };

        let analysisData = null;

        function analyzeText() {
            const text = document.getElementById('inputText').value;
            if (!text.trim()) {
                alert('Napiš text.');
                return;
            }

            const sentences = text.split(/[.!?]+/).filter(s => s.trim());
            const words = text.trim().split(/\s+/);

            const figureCount = {};
            let highlights = [];
            let position = 0;

            sentences.forEach(sentence => {
                const trimmed = sentence.trim();
                
                Object.keys(FIGURES).forEach(figureName => {
                    try {
                        if (FIGURES[figureName].detect(trimmed, sentences)) {
                            figureCount[figureName] = (figureCount[figureName] || 0) + 1;
                            highlights.push({
                                figure: figureName,
                                position: text.indexOf(trimmed, position),
                                length: trimmed.length,
                                color: FIGURES[figureName].color
                            });
                        }
                    } catch (e) {}
                });

                position += trimmed.length + 2;
            });

            const angleScores = {};
            Object.keys(ANGLES).forEach(angleName => {
                const figuresInAngle = ANGLES[angleName];
                let score = 0;
                figuresInAngle.forEach(fig => {
                    if (figureCount[fig]) score += figureCount[fig];
                });
                angleScores[angleName] = score;
            });

            analysisData = {
                text: text,
                sentences: sentences.length,
                words: words.length,
                figures: figureCount,
                angles: angleScores,
                highlights: highlights
            };

            displayAnalysis();
        }

        function displayAnalysis() {
            if (!analysisData) return;

            document.getElementById('statWords').textContent = analysisData.words;
            document.getElementById('statSentences').textContent = analysisData.sentences;
            const totalFigures = Object.values(analysisData.figures).reduce((a, b) => a + b, 0);
            document.getElementById('statFigures').textContent = totalFigures;

            const figuresHtml = Object.keys(FIGURES)
                .sort((a, b) => (analysisData.figures[b] || 0) - (analysisData.figures[a] || 0))
                .map(figureName => {
                    const count = analysisData.figures[figureName] || 0;
                    if (count === 0) return '';
                    return `<div class="figure-item"><span>${figureName}</span><span>${count}×</span></div>`;
                }).join('');
            document.getElementById('figuresOutput').innerHTML = figuresHtml || '<div class="empty-state">Žádné figury</div>';

            let highlightedText = analysisData.text;
            const sortedHighlights = analysisData.highlights.sort((a, b) => b.position - a.position);
            
            sortedHighlights.forEach(h => {
                const before = highlightedText.substring(0, h.position);
                const highlighted = highlightedText.substring(h.position, h.position + h.length);
                const after = highlightedText.substring(h.position + h.length);
                highlightedText = before + `<span class="figure-highlight" style="background-color: ${h.color}60;" title="${h.figure}">${highlighted}</span>` + after;
            });

            document.getElementById('highlightedText').innerHTML = highlightedText;

            const anglesHtml = Object.keys(ANGLES)
                .sort((a, b) => analysisData.angles[b] - analysisData.angles[a])
                .map(angleName => `
                    <div class="angle-item">
                        <span>${angleName}</span>
                        <span>${analysisData.angles[angleName] || 0} bodů</span>
                    </div>
                `).join('');
            document.getElementById('anglesOutput').innerHTML = anglesHtml;
        }

        function clearAnalysis() {
            document.getElementById('inputText').value = '';
            document.getElementById('figuresOutput').innerHTML = '<div class="empty-state">Analyzuj text</div>';
            document.getElementById('highlightedText').innerHTML = '<div class="empty-state">Text se zvýrazní po analýze</div>';
            document.getElementById('anglesOutput').innerHTML = '<div class="empty-state">Úhly se vypočítají z figur</div>';
            analysisData = null;
        }

        const params = new URLSearchParams(window.location.search);
        if (params.has('text')) {
            document.getElementById('inputText').value = decodeURIComponent(params.get('text'));
            analyzeText();
        }
    </script>
</body>
</html>
